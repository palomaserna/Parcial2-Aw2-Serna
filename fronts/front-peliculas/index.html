<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Películas</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
        <style>
            *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
            body {
                background: #f0eff8;
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
                color: #1a1825;
                min-height: 100vh;
            }
            nav {
                background: #1a1825;
                padding: 0 2rem;
                height: 54px;
                display: flex;
                align-items: center;
                justify-content: space-between;
            }
            .nav-brand {
                display: flex;
                align-items: center;
                gap: 8px;
                color: #fff;
                font-size: 14px;
                font-weight: 500;
            }
            .nav-brand i { font-size: 20px; color: #9d96f0; }
            .nav-links { display: flex; gap: 4px; }
            .nav-links a {
                color: rgba(255,255,255,0.6);
                text-decoration: none;
                font-size: 13px;
                padding: 6px 12px;
                border-radius: 8px;
                transition: background 0.15s, color 0.15s;
            }
            .nav-links a:hover { background: rgba(255,255,255,0.08); color: #fff; }
            .nav-links a.active { color: #fff; }
            .contenedor {
                max-width: 960px;
                margin: 2rem auto;
                padding: 0 1.5rem;
            }
            h1 { font-size: 22px; font-weight: 500; margin-bottom: 1.5rem; }
            .lista {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
                gap: 12px;
            }
            .tarjeta {
                background: #fff;
                border: 1px solid #e4e2f5;
                border-radius: 14px;
                padding: 1rem 1.25rem;
                text-decoration: none;
                color: #1a1825;
                display: block;
                transition: box-shadow 0.15s, transform 0.15s;
            }
            .tarjeta:hover { box-shadow: 0 4px 18px rgba(83,74,183,0.12); transform: translateY(-2px); }
            .tarjeta h3 { font-size: 15px; font-weight: 500; margin-bottom: 6px; }
            .tarjeta p { font-size: 12px; color: #6b6884; margin: 2px 0; }
            .tarjeta-footer {
                display: flex;
                align-items: center;
                justify-content: space-between;
                margin-top: 10px;
            }
            .badge {
                display: inline-block;
                font-size: 11px;
                font-weight: 500;
                padding: 2px 10px;
                border-radius: 99px;
                background: #EEEDFE;
                color: #534AB7;
            }
            .score { font-size: 13px; font-weight: 500; color: #534AB7; }
            .loading { color: #6b6884; font-size: 14px; }
        </style>
    </head>
    <body>
        <nav>
            <div class="nav-brand"><i class="ti ti-movie"></i>Catálogo de películas</div>
            <div class="nav-links">
                <a href="/peliculas" class="active">Items</a>
                <a href="/procedimiento">Procedimiento</a>
                <a href="/cerrar-sesion">Cerrar sesión</a>
            </div>
        </nav>

        <div class="contenedor">
            <h1>Listado de películas</h1>
            <div class="lista" id="lista">
                <p class="loading">Cargando películas...</p>
            </div>
        </div>

        <script>
            const lista = document.getElementById('lista')
            fetch('/api/v1/peliculas').then((response) => {
                if (response.status === 401) { window.location.href = '/login'; return }
                if (!response.ok) { lista.innerHTML = '<p class="loading">Ocurrió un error al cargar las películas.</p>'; return }
                response.json().then((cuerpo) => {
                    const datos = cuerpo.datos
                    if (!datos || datos.length === 0) { lista.innerHTML = '<p class="loading">No hay películas para mostrar.</p>'; return }
                    lista.innerHTML = datos.map((pelicula) => `
                        <a class="tarjeta" href="/pelicula?id=${pelicula.id}">
                            <h3>${pelicula.titulo}</h3>
                            <p>Director: ${pelicula.director}</p>
                            <p>Año: ${pelicula.año}</p>
                            <div class="tarjeta-footer">
                                <span class="badge">${pelicula.genero}</span>
                                <span class="score">★ ${pelicula.puntuacion}</span>
                            </div>
                        </a>
                    `).join('')
                })
            })
        </script>
    </body>
</html>
