<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>LOGIN</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
        <style>
            *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
            body {
                background: #f0eff8;
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            }
            .login-card {
                background: #fff;
                border: 1px solid #e4e2f5;
                border-radius: 16px;
                padding: 2.5rem 2rem;
                width: 100%;
                max-width: 360px;
                box-shadow: 0 4px 24px rgba(83,74,183,0.08);
            }
            .login-logo {
                display: flex;
                align-items: center;
                gap: 10px;
                margin-bottom: 2rem;
            }
            .login-logo-icon {
                width: 38px;
                height: 38px;
                background: #534AB7;
                border-radius: 10px;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .login-logo-icon i { color: #fff; font-size: 20px; }
            .login-logo-text { font-size: 15px; font-weight: 500; color: #1a1825; }
            .login-title { font-size: 18px; font-weight: 500; color: #1a1825; margin-bottom: 1.75rem; }
            .field { margin-bottom: 1.25rem; }
            .field label {
                display: block;
                font-size: 13px;
                font-weight: 500;
                color: #6b6884;
                margin-bottom: 6px;
            }
            .field input {
                width: 100%;
                height: 40px;
                border: 1px solid #dddae8;
                border-radius: 8px;
                background: #f8f7fc;
                padding: 0 12px;
                font-size: 14px;
                color: #1a1825;
                outline: none;
                transition: border-color 0.15s;
            }
            .field input:focus { border-color: #534AB7; background: #fff; }
            .field input::placeholder { color: #b0adc4; }
            button[type='submit'] {
                width: 100%;
                height: 42px;
                background: #534AB7;
                color: #fff;
                border: none;
                border-radius: 8px;
                font-size: 14px;
                font-weight: 500;
                cursor: pointer;
                margin-top: 0.5rem;
                transition: background 0.2s;
            }
            button[type='submit']:hover { background: #4339a0; }
        </style>
    </head>
    <body>
        <div class="login-card">
            <div class="login-logo">
                <div class="login-logo-icon"><i class="ti ti-movie"></i></div>
                <span class="login-logo-text">Catálogo de películas</span>
            </div>
            <p class="login-title">Iniciá sesión</p>
            <form id="form">
                <div class="field">
                    <label for="usuario">Usuario</label>
                    <input type="text" id="usuario" name="usuario" placeholder="Tu nombre de usuario" required />
                </div>
                <div class="field">
                    <label for="pass">Contraseña</label>
                    <input type="password" id="pass" name="pass" placeholder="••••••••" required />
                </div>
                <button type="submit">Ingresar</button>
            </form>
        </div>
        <script>
            const form = document.getElementById('form')
            form.addEventListener('submit', (event) => {
                event.preventDefault()
                const usuario = document.getElementById('usuario').value
                const pass = document.getElementById('pass').value
                fetch('/autenticacion', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usuario, pass }),
                }).then((response) => {
                    if (!response.ok) {
                        console.log('Error')
                        alert('Credenciales no válidas')
                        form.reset()
                    } else {
                        if (response.redirected) {
                            window.location.href = response.url
                        }
                        console.log('Sesión iniciada correctamente')
                    }
                })
            })
        </script>
    </body>
</html>
